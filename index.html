<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>EMF Group | منصة إدارة وتوزيع المحتوى الرقمي</title>
    <meta name="description" content="البوابة الرسمية لشركة EMF Group لتصفح وتحميل أحدث الفيديوهات والتطبيقات والملفات المسجلة لأعضاء الشركة والعملاء بأعلى كفاءة وسرعة استجابة." />
    <meta name="theme-color" content="#0a0f1d" id="theme-color-meta" />
    <script>
      (function() {
        var stored = null;
        try { stored = localStorage.getItem('emf-theme-mode'); } catch(e) {}
        if (stored !== 'light' && stored !== 'dark' && stored !== 'system') {
          try {
            var legacy = localStorage.getItem('emf-theme');
            if (legacy === 'light' || legacy === 'dark') {
              stored = legacy;
              localStorage.setItem('emf-theme-mode', legacy);
              localStorage.removeItem('emf-theme');
            }
          } catch(e) {}
        }
        var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        var theme = mode === 'system'
          ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          : mode;
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-bs-theme', theme);
        var meta = document.getElementById('theme-color-meta');
        if (meta) {
          meta.content = theme === 'dark' ? '#0a0f1d' : '#f8fafc';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
